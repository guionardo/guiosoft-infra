---
- name: Install smartmontools
  apt:
    name: smartmontools
    state: present

- name: Enable SMART on all available drives
  shell: |
    for dev in /dev/sd[a-z] /dev/nvme[0-9]n[0-9]; do
      [ -e "$dev" ] && smartctl --smart=on --offlineauto=on --saveauto=on "$dev" || true
    done
  changed_when: false

- name: Create smartd configuration
  template:
    src: smartd.conf.j2
    dest: /etc/smartd.conf
    mode: '0644'
  notify: Restart smartd

- name: Start and enable smartd
  systemd:
    name: smartd
    state: started
    enabled: yes

- name: Enable and start fstrim timer
  systemd:
    name: fstrim.timer
    state: started
    enabled: yes
