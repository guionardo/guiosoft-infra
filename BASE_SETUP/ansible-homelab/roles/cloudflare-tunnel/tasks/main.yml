---
- name: Add Cloudflare GPG key
  get_url:
    url: https://pkg.cloudflare.com/cloudflare-main.gpg
    dest: /usr/share/keyrings/cloudflare-main.gpg
    mode: '0644'

- name: Add Cloudflare apt repository
  copy:
    dest: /etc/apt/sources.list.d/cloudflared.list
    content: |
      deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared any main
    mode: '0644'

- name: Install cloudflared
  apt:
    name: cloudflared
    state: present
    update_cache: yes

- name: Check stored token hash
  stat:
    path: /etc/cloudflared/token-hash
  register: cf_hash_stat
  when: cloudflare_tunnel_token | length > 0

- name: Read token hash if exists
  slurp:
    src: /etc/cloudflared/token-hash
  register: cf_stored_hash
  when:
    - cloudflare_tunnel_token | length > 0
    - cf_hash_stat.stat.exists

- name: Remove existing cloudflared service if token changed
  file:
    path: /etc/systemd/system/cloudflared.service
    state: absent
  when:
    - cloudflare_tunnel_token | length > 0
    - cf_hash_stat.stat.exists
    - (cf_stored_hash.content | b64decode | default('')) != (cloudflare_tunnel_token | hash('sha1'))

- name: Install cloudflared tunnel service
  command: cloudflared service install {{ cloudflare_tunnel_token }}
  args:
    creates: /etc/systemd/system/cloudflared.service
  no_log: yes
  when: cloudflare_tunnel_token | length > 0

- name: Create cloudflared config directory
  file:
    path: /etc/cloudflared
    state: directory
    mode: '0755'
  when: cloudflare_tunnel_token | length > 0

- name: Store current token hash
  copy:
    content: "{{ cloudflare_tunnel_token | hash('sha1') }}"
    dest: /etc/cloudflared/token-hash
    mode: '0644'
  no_log: yes
  when: cloudflare_tunnel_token | length > 0
