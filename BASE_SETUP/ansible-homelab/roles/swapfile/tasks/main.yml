---
- name: Check if swapfile already exists
  stat:
    path: "{{ swapfile_path }}"
  register: swapfile_check

- name: Create swapfile
  command:
    cmd: "dd if=/dev/zero of={{ swapfile_path }} bs=1M count={{ swapfile_size_mb }}"
    creates: "{{ swapfile_path }}"

- name: Set swapfile permissions
  file:
    path: "{{ swapfile_path }}"
    mode: '0600'

- name: Format swapfile
  command:
    cmd: "mkswap {{ swapfile_path }}"
  when: not swapfile_check.stat.exists

- name: Enable swapfile
  command:
    cmd: "swapon {{ swapfile_path }}"
  when: not swapfile_check.stat.exists

- name: Add swapfile to /etc/fstab
  lineinfile:
    path: /etc/fstab
    regexp: "{{ swapfile_path | regex_escape }}"
    line: "{{ swapfile_path }} none swap defaults 0 0"
    state: present

- name: Set swappiness
  sysctl:
    name: vm.swappiness
    value: "{{ swap_swappiness }}"
    state: present
    reload: yes
