---
- name: Remove leftover 45Drives sources from previous failed runs
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/45drives-enterprise-trixie.list
    - /etc/apt/sources.list.d/45drives.sources
    - /etc/apt/sources.list.d/45drives.list
    - /etc/apt/keyrings/45drives-archive-keyring.gpg
    - /etc/apt/keyrings/45drives.asc
    - /usr/share/keyrings/45drives-archive-keyring.gpg
    - /opt/45drives

- name: Install Cockpit and base plugins
  apt:
    name: "{{ ['cockpit'] + cockpit_plugins }}"
    state: present

- name: Start and enable cockpit socket
  systemd:
    name: cockpit.socket
    state: started
    enabled: yes

- name: Configure cockpit port
  lineinfile:
    path: /etc/cockpit/cockpit.conf
    regexp: "^Port"
    line: "Port = {{ cockpit_port }}"
    state: present
    create: yes
  notify: Restart cockpit

- name: Allow cockpit port in UFW
  ufw:
    rule: allow
    port: "{{ cockpit_port }}"
    proto: tcp

- name: Install cockpit-sensors
  block:
    - name: Download cockpit-sensors tarball
      get_url:
        url: https://github.com/ocristopfer/cockpit-sensors/releases/latest/download/cockpit-sensors.tar.xz
        dest: /tmp/cockpit-sensors.tar.xz
        mode: '0644'
      register: sensors_download

    - name: Extract cockpit-sensors tarball
      unarchive:
        src: /tmp/cockpit-sensors.tar.xz
        dest: /tmp
        remote_src: yes
      when: sensors_download.changed

    - name: Install cockpit-sensors
      copy:
        src: /tmp/cockpit-sensors/dist/
        dest: /usr/share/cockpit/sensors/
        remote_src: yes
        mode: '0644'
      when: sensors_download.changed

    - name: Clean up cockpit-sensors temp files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/cockpit-sensors.tar.xz
        - /tmp/cockpit-sensors

- name: Ensure GPG keyrings directory exists
  file:
    path: /usr/share/keyrings
    state: directory
    mode: '0755'

- name: Add cockpit-dockermanager APT repo
  copy:
    dest: /etc/apt/sources.list.d/cockpit-dockermanager.list
    content: |
      deb [trusted=yes arch=all] https://chrisjbawden.github.io/cockpit-dockermanager stable main
    mode: '0644'

- name: Install dockermanager
  apt:
    name: dockermanager
    state: present
    update_cache: yes

- name: Add 45Drives repository
  block:
    - name: Download 45Drives GPG key
      get_url:
        url: https://repo.45drives.com/key/gpg.asc
        dest: /usr/share/keyrings/45drives-archive-keyring.gpg
        mode: '0644'

    - name: Add 45Drives apt sources
      copy:
        dest: /etc/apt/sources.list.d/45drives.sources
        content: |
          Types: deb
          URIs: https://repo.45drives.com/enterprise/debian
          Suites: bookworm
          Components: main
          Architectures: amd64
          Signed-By: /usr/share/keyrings/45drives-archive-keyring.gpg
        mode: '0644'

- name: Install 45Drives cockpit plugins
  apt:
    name:
      - cockpit-file-sharing
      - cockpit-navigator
      - cockpit-benchmark
    state: present
    update_cache: yes

- name: Install cockpit-compose
  block:
    - name: Get latest cockpit-compose release
      uri:
        url: https://api.github.com/repos/RXTX4816/cockpit-compose/releases/latest
        return_content: yes
      register: compose_release
      until: compose_release.status == 200
      retries: 3
      delay: 5

    - name: Download cockpit-compose .deb
      get_url:
        url: "https://github.com/RXTX4816/cockpit-compose/releases/download/{{ compose_release.json.tag_name }}/cockpit-compose_{{ compose_release.json.tag_name | regex_replace('^v', '') }}-1_all.deb"
        dest: /tmp/cockpit-compose.deb
        mode: '0644'

    - name: Install cockpit-compose
      apt:
        deb: /tmp/cockpit-compose.deb

- name: Install cockpit-cloudflared
  block:
    - name: Install rpm2cpio
      apt:
        name: rpm2cpio
        state: present

    - name: Download cockpit-cloudflared RPM
      get_url:
        url: https://github.com/gbraad-cockpit/cockpit-cloudflared/releases/download/v0.0.2/cockpit-cloudflared-v0.0.2-1.fc38.noarch.rpm
        dest: /tmp/cockpit-cloudflared.rpm
        mode: '0644'

    - name: Extract and install cloudflared plugin
      shell: |
        mkdir -p /tmp/cf-extract
        cd /tmp/cf-extract
        rpm2cpio /tmp/cockpit-cloudflared.rpm | cpio -idm
        cp -r usr/share/cockpit/cloudflared /usr/share/cockpit/
        rm -rf /tmp/cf-extract /tmp/cockpit-cloudflared.rpm
      args:
        creates: /usr/share/cockpit/cloudflared/manifest.json
